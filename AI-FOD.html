<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI FOD | Command Center PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        @keyframes highlight-fade {
            0% { background-color: #fef2f2; border-left: 6px solid #ef4444; }
            100% { background-color: transparent; border-left: 6px solid #e2e8f0; }
        }
        .new-detection-flash { animation: highlight-fade 4s ease-out forwards; }

        .sector-active {
            background-color: rgba(185, 28, 28, 0.7) !important;
            border-color: #ef4444 !important;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.6);
        }

        .video-container { 
            aspect-ratio: 16/9; 
            background: #000; 
            border-radius: 1.5rem; 
            overflow: hidden; 
            border: 4px solid #0f172a;
            position: relative;
        }
        
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-900">

    <audio id="alert-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

    <header class="bg-slate-900 text-white shadow-2xl sticky top-0 z-50 border-b border-slate-700">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-2xl">✈️</span>
                <h1 class="text-xl font-black tracking-tighter uppercase italic">FOD <span class="text-sky-400">VISION</span> <span class="text-[10px] not-italic font-normal bg-slate-800 px-2 py-1 rounded ml-2 uppercase">Command Center</span></h1>
            </div>
            <div class="flex items-center space-x-6">
                <div id="audio-status" class="flex items-center space-x-2 bg-slate-800 px-3 py-1 rounded-full border border-slate-700">
                    <span id="audio-dot" class="w-2 h-2 bg-red-500 rounded-full"></span>
                    <span id="audio-text" class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Audio Locked</span>
                </div>
                <div id="connection-status" class="flex items-center space-x-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Live Engine Linked</span>
                </div>
                <button id="reset-db" class="text-[10px] font-bold bg-slate-700 hover:bg-red-600 text-white px-4 py-2 rounded-full transition-all uppercase">
                    Clear Master Log
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-8">
            <div class="lg:col-span-8 bg-white p-4 rounded-3xl shadow-xl border border-slate-200">
                <div class="video-container group">
                    <img id="stream-img" src="http://localhost:5001/video_feed" class="w-full h-full object-cover transition-opacity duration-500" alt="Connecting to Camera Engine...">
                    <div class="absolute bottom-6 left-6 z-50">
                        <button id="toggle-btn" onclick="toggleSystem()" class="bg-red-600 hover:bg-red-700 text-white px-8 py-3 rounded-full font-black text-xs shadow-2xl flex items-center space-x-3 border-2 border-white/10 transition-all active:scale-95">
                            <span id="btn-icon">⏹</span> <span id="btn-text">STOP SURVEILLANCE</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4 flex flex-col space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-200 flex-1 flex flex-col justify-center text-center">
                    <h3 class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-2 italic">Threats Identified</h3>
                    <p id="total-fod-count" class="text-7xl font-black text-slate-900 leading-none">0</p>
                </div>
                
                <div class="bg-slate-900 p-6 rounded-3xl shadow-xl border-4 border-slate-800 flex-1">
                    <h3 class="text-white text-[10px] font-bold uppercase mb-6 tracking-widest flex items-center">
                        <span class="w-2 h-2 bg-sky-500 rounded-full mr-2"></span> Spatial Runway Map
                    </h3>
                    <div class="grid grid-cols-1 gap-3">
                        <div id="map-sector-a" class="h-14 border-2 border-slate-700 rounded-2xl flex items-center justify-center transition-all duration-300">
                            <span class="text-[10px] font-black text-slate-600 tracking-widest uppercase">Sector Alpha</span>
                        </div>
                        <div id="map-sector-b" class="h-14 border-2 border-slate-700 rounded-2xl flex items-center justify-center transition-all duration-300">
                            <span class="text-[10px] font-black text-slate-600 tracking-widest uppercase">Sector Bravo</span>
                        </div>
                        <div id="map-sector-c" class="h-14 border-2 border-slate-700 rounded-2xl flex items-center justify-center transition-all duration-300">
                            <span class="text-[10px] font-black text-slate-600 tracking-widest uppercase">Sector Charlie</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-200 mb-8">
            <h3 class="text-slate-800 font-bold uppercase text-[10px] tracking-widest mb-6 flex items-center">Detection Frequency Over Time</h3>
            <div style="height: 250px;"><canvas id="liveFodChart"></canvas></div>
        </div>

        <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
            <div class="px-8 py-5 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-500">Security Event Log</h3>
                <span class="text-[9px] bg-sky-100 text-sky-700 px-3 py-1 rounded font-black">SYNCED</span>
            </div>
            <div class="overflow-x-auto custom-scroll max-h-96">
                <table class="w-full text-left border-collapse">
                    <thead class="sticky top-0 bg-white shadow-sm z-10">
                        <tr class="text-[10px] font-black text-slate-400 uppercase border-b border-slate-100">
                            <th class="px-8 py-4">Logged Time</th>
                            <th class="px-8 py-4">Threat Type</th>
                            <th class="px-8 py-4">Zone</th>
                            <th class="px-8 py-4">Confidence</th>
                            <th class="px-8 py-4">Status</th>
                        </tr>
                    </thead>
                    <tbody id="master-log-body" class="text-xs font-semibold text-slate-600 divide-y divide-slate-50"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, limit, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA-0IuHdbOTVBK91SvreYJW_cPfhM3v9ks",
            authDomain: "fod-35c19.firebaseapp.com",
            projectId: "fod-35c19",
            storageBucket: "fod-35c19.firebasestorage.app",
            messagingSenderId: "715718274224",
            appId: "1:715718274224:web:ecc75e6d325d4a36a4df75"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const alertsRef = collection(db, "fod_alerts");
        let knownIds = new Set();
        let audioEnabled = false;

        // --- NEW: Global Audio Unlocker ---
        // This ensures the sound plays even if they don't click the "Start" button specifically.
        const unlockAudio = () => {
            if (audioEnabled) return;
            const audio = document.getElementById('alert-sound');
            audio.play().then(() => {
                audio.pause();
                audio.currentTime = 0;
                audioEnabled = true;
                document.getElementById('audio-dot').classList.replace('bg-red-500', 'bg-green-500');
                document.getElementById('audio-text').innerText = "Audio Armed";
                console.log("🔊 Audio System Initialized");
            }).catch(e => console.log("Waiting for interaction..."));
        };

        document.body.addEventListener('click', unlockAudio, { once: true });

        // Chart Setup
        const ctx = document.getElementById('liveFodChart').getContext('2d');
        const liveFodChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Detections', data: [], borderColor: '#0ea5e9', backgroundColor: 'rgba(14, 165, 233, 0.05)', fill: true, tension: 0.4, borderWidth: 3 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        // 1. Toggle System
        window.toggleSystem = async () => {
            unlockAudio(); // Also unlock here just in case
            try {
                const res = await fetch('http://localhost:5001/toggle_stream', { method: 'POST' });
                const data = await res.json();
                const btnText = document.getElementById('btn-text');
                const btnIcon = document.getElementById('btn-icon');
                const btn = document.getElementById('toggle-btn');
                const img = document.getElementById('stream-img');

                if (data.active) {
                    btnText.innerText = "STOP SURVEILLANCE";
                    btnIcon.innerText = "⏹";
                    btn.classList.replace('bg-green-600', 'bg-red-600');
                    img.style.opacity = "1";
                } else {
                    btnText.innerText = "START SURVEILLANCE";
                    btnIcon.innerText = "▶";
                    btn.classList.replace('bg-red-600', 'bg-green-600');
                    img.style.opacity = "0.3";
                }
            } catch (e) { alert("Engine connection failed."); }
        };

        // 2. FIREBASE SYNC (Map Glow + Alarm + Table)
        // Using snapshot.docChanges() is the most reliable way to catch "New" events
        onSnapshot(query(alertsRef, orderBy("timestamp", "desc"), limit(20)), (snapshot) => {
            const table = document.getElementById('master-log-body');
            const audio = document.getElementById('alert-sound');
            const totalCountEl = document.getElementById('total-fod-count');
            
            totalCountEl.innerText = snapshot.size;

            // Clear Map State
            ['a', 'b', 'c'].forEach(s => {
                const el = document.getElementById(`map-sector-${s}`);
                if (el) {
                    el.classList.remove('sector-active');
                    el.querySelector('span').classList.replace('text-white', 'text-slate-600');
                }
            });

            // Handle New Detections for Alarm
            snapshot.docChanges().forEach((change) => {
                if (change.type === "added") {
                    const docId = change.doc.id;
                    // knownIds.size > 0 prevents the alarm from screaming for old logs on page refresh
                    if (knownIds.size > 0 && !knownIds.has(docId)) {
                        console.log("🔔 New Alert Triggered!");
                        if (audioEnabled) {
                            audio.currentTime = 0;
                            audio.play().catch(e => console.error("Playback error:", e));
                        }
                    }
                    knownIds.add(docId);
                }
            });

            table.innerHTML = '';
            let history = {};

            snapshot.forEach((doc) => {
                const d = doc.data();
                
                // Map Glow Logic
                if (d.sector) {
                    const sectorID = `map-sector-${d.sector.toLowerCase().split(' ').pop()}`;
                    const sectorEl = document.getElementById(sectorID);
                    if (sectorEl) {
                        sectorEl.classList.add('sector-active');
                        sectorEl.querySelector('span').classList.replace('text-slate-600', 'text-white');
                    }
                }

                // Table Update
                const time = d.timestamp ? d.timestamp.toDate().toLocaleTimeString() : 'Syncing...';
                const isNewEntry = knownIds.has(doc.id) && snapshot.docChanges().some(c => c.doc.id === doc.id && c.type === "added" && knownIds.size > 20);

                table.insertAdjacentHTML('beforeend', `
                    <tr class="${isNewEntry ? 'new-detection-flash' : ''} hover:bg-slate-50 transition-colors">
                        <td class="px-8 py-4 font-mono text-slate-400 font-bold">${time}</td>
                        <td class="px-8 py-4"><span class="bg-red-100 text-red-700 px-3 py-1 rounded text-[10px] font-black uppercase tracking-tighter">Foreign Object</span></td>
                        <td class="px-8 py-4 uppercase font-black text-slate-900">${d.sector || 'N/A'}</td>
                        <td class="px-8 py-4 font-bold text-sky-600">${(d.confidence * 100).toFixed(1)}%</td>
                        <td class="px-8 py-4 flex items-center"><span class="w-2 h-2 bg-red-500 rounded-full mr-2 animate-pulse"></span> Unresolved</td>
                    </tr>
                `);

                if (d.timestamp) {
                    const t = d.timestamp.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    history[t] = (history[t] || 0) + 1;
                }
            });

            // Update Chart
            liveFodChart.data.labels = Object.keys(history).slice(-12);
            liveFodChart.data.datasets[0].data = Object.values(history).slice(-12);
            liveFodChart.update();
        });

        // System Reset
        document.getElementById('reset-db').addEventListener('click', async () => {
            if (confirm("Wipe all logs?")) {
                const snap = await getDocs(alertsRef);
                const batch = writeBatch(db);
                snap.forEach(d => batch.delete(d.ref));
                await batch.commit();
                knownIds.clear();
            }
        });
    </script>
</body>
</html>
